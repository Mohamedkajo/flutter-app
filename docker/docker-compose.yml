version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cargo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cargo}
      POSTGRES_USER: ${POSTGRES_USER:-cargo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cargo_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cargo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: cargo_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-cargo}:${POSTGRES_PASSWORD:-cargo_secret}@postgres:5432/${POSTGRES_DB:-cargo}
      SESSION_SECRET: ${SESSION_SECRET:-change_me_in_production}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
    container_name: cargo_admin
    restart: unless-stopped
    ports:
      - "3002:80"

  cargo:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cargo
    container_name: cargo_web
    restart: unless-stopped
    ports:
      - "3003:80"

  website:
    build:
      context: ..
      dockerfile: docker/Dockerfile.website
    container_name: cargo_website
    restart: unless-stopped
    ports:
      - "3004:80"

  nginx:
    image: nginx:alpine
    container_name: cargo_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - admin
      - cargo
      - website

volumes:
  postgres_data:
  uploads_data:
