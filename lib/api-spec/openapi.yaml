components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ---- AUTH ----
    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        password:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        avatar:
          type: ["string", "null"]
        role:
          type: string
          enum: [customer, merchant, driver, admin]
        loyaltyPoints:
          type: integer
        createdAt:
          type: string

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        avatar:
          type: string

    # ---- CATEGORY ----
    Category:
      type: object
      required: [id, name, slug, icon]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        icon:
          type: string
        image:
          type: ["string", "null"]
        storeCount:
          type: integer

    # ---- STORE ----
    Store:
      type: object
      required: [id, name, slug, categoryName, rating, deliveryTime, deliveryFee, image, isOpen]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        logo:
          type: ["string", "null"]
        image:
          type: string
        categoryName:
          type: string
        categoryIcon:
          type: ["string", "null"]
        rating:
          type: number
        reviewCount:
          type: integer
        deliveryTime:
          type: string
        deliveryFee:
          type: number
        minOrder:
          type: number
        isOpen:
          type: boolean
        isFeatured:
          type: boolean
        isVerified:
          type: boolean
        isTrending:
          type: boolean
        isOnline:
          type: boolean
        tags:
          type: array
          items:
            type: string
        distance:
          type: ["number", "null"]

    StoreDetail:
      allOf:
        - $ref: "#/components/schemas/Store"
        - type: object
          properties:
            description:
              type: ["string", "null"]
            address:
              type: ["string", "null"]
            phone:
              type: ["string", "null"]
            whatsapp:
              type: ["string", "null"]
            latitude:
              type: ["number", "null"]
            longitude:
              type: ["number", "null"]
            openingHours:
              type: ["string", "null"]
            bannerImage:
              type: ["string", "null"]
            socialMedia:
              type: object
              properties:
                instagram:
                  type: ["string", "null"]
                facebook:
                  type: ["string", "null"]
                twitter:
                  type: ["string", "null"]
            productCategories:
              type: array
              items:
                type: string

    StoreUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        phone:
          type: string
        address:
          type: string
        openingHours:
          type: string

    # ---- PRODUCT ----
    Product:
      type: object
      required: [id, name, price, storeId, storeName, image, categoryName]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        originalPrice:
          type: ["number", "null"]
        image:
          type: string
        storeId:
          type: integer
        storeName:
          type: string
        categoryName:
          type: string
        rating:
          type: number
        reviewCount:
          type: integer
        isAvailable:
          type: boolean
        isFeatured:
          type: boolean
        discountPercent:
          type: ["integer", "null"]
        tags:
          type: array
          items:
            type: string

    ProductDetail:
      allOf:
        - $ref: "#/components/schemas/Product"
        - type: object
          properties:
            variants:
              type: array
              items:
                $ref: "#/components/schemas/ProductVariant"
            addons:
              type: array
              items:
                $ref: "#/components/schemas/ProductAddon"
            gallery:
              type: array
              items:
                type: string
            nutritionInfo:
              type: ["string", "null"]
            preparationTime:
              type: ["string", "null"]

    ProductVariant:
      type: object
      required: [id, name, price]
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
        isAvailable:
          type: boolean

    ProductAddon:
      type: object
      required: [id, name, price]
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number

    ProductInput:
      type: object
      required: [name, price, categoryName]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        originalPrice:
          type: number
        image:
          type: string
        categoryName:
          type: string

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        image:
          type: string
        isAvailable:
          type: boolean

    # ---- CART ----
    Cart:
      type: object
      required: [id, items, subtotal, deliveryFee, total]
      properties:
        id:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        storeId:
          type: ["integer", "null"]
        storeName:
          type: ["string", "null"]
        subtotal:
          type: number
        deliveryFee:
          type: number
        discount:
          type: number
        total:
          type: number
        couponCode:
          type: ["string", "null"]

    CartItem:
      type: object
      required: [id, productId, name, image, price, quantity]
      properties:
        id:
          type: integer
        productId:
          type: integer
        name:
          type: string
        image:
          type: string
        price:
          type: number
        quantity:
          type: integer
        variant:
          type: ["string", "null"]
        addons:
          type: array
          items:
            type: string
        specialInstructions:
          type: ["string", "null"]

    CartItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        variantId:
          type: integer
        addonIds:
          type: array
          items:
            type: integer
        specialInstructions:
          type: string

    CartItemUpdate:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer

    # ---- ORDER ----
    Order:
      type: object
      required: [id, userId, storeId, storeName, status, total, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        storeId:
          type: integer
        storeName:
          type: string
        storeImage:
          type: ["string", "null"]
        driverId:
          type: ["integer", "null"]
        driverName:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, accepted, preparing, packed, driver_assigned, picked_up, delivering, delivered, completed, cancelled, refunded, returned]
        subtotal:
          type: number
        deliveryFee:
          type: number
        discount:
          type: number
        total:
          type: number
        paymentMethod:
          type: string
        estimatedDelivery:
          type: ["string", "null"]
        deliveryAddress:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        itemCount:
          type: integer

    OrderDetail:
      allOf:
        - $ref: "#/components/schemas/Order"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/CartItem"
            timeline:
              type: array
              items:
                $ref: "#/components/schemas/OrderTimelineEvent"
            invoice:
              type: ["string", "null"]

    OrderTimelineEvent:
      type: object
      required: [status, timestamp, label]
      properties:
        status:
          type: string
        timestamp:
          type: string
        label:
          type: string
        completed:
          type: boolean

    OrderInput:
      type: object
      required: [addressId, paymentMethod]
      properties:
        addressId:
          type: integer
        paymentMethod:
          type: string
          enum: [wallet, card, cash, apple_pay, google_pay]
        couponCode:
          type: string
        scheduledAt:
          type: string
        specialInstructions:
          type: string

    # ---- TRACKING ----
    TrackingInfo:
      type: object
      required: [orderId, status, eta]
      properties:
        orderId:
          type: integer
        status:
          type: string
        eta:
          type: string
        driverName:
          type: ["string", "null"]
        driverPhone:
          type: ["string", "null"]
        driverAvatar:
          type: ["string", "null"]
        driverRating:
          type: ["number", "null"]
        driverLat:
          type: ["number", "null"]
        driverLng:
          type: ["number", "null"]
        storeAddress:
          type: string
        deliveryAddress:
          type: string
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/OrderTimelineEvent"

    # ---- ADDRESS ----
    Address:
      type: object
      required: [id, label, address]
      properties:
        id:
          type: integer
        label:
          type: string
        address:
          type: string
        apartment:
          type: ["string", "null"]
        city:
          type: string
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        isDefault:
          type: boolean

    AddressInput:
      type: object
      required: [label, address, city]
      properties:
        label:
          type: string
        address:
          type: string
        apartment:
          type: string
        city:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        isDefault:
          type: boolean

    # ---- WALLET ----
    Wallet:
      type: object
      required: [id, balance, currency]
      properties:
        id:
          type: integer
        balance:
          type: number
        currency:
          type: string
        loyaltyPoints:
          type: integer

    WalletTransaction:
      type: object
      required: [id, type, amount, description, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [credit, debit, refund, reward]
        amount:
          type: number
        description:
          type: string
        orderId:
          type: ["integer", "null"]
        createdAt:
          type: string

    TopUpInput:
      type: object
      required: [amount, paymentMethod]
      properties:
        amount:
          type: number
        paymentMethod:
          type: string

    # ---- COUPONS ----
    Coupon:
      type: object
      required: [id, code, discount, type, title, expiresAt]
      properties:
        id:
          type: integer
        code:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        discount:
          type: number
        type:
          type: string
          enum: [percentage, fixed]
        minOrder:
          type: ["number", "null"]
        maxDiscount:
          type: ["number", "null"]
        expiresAt:
          type: string
        isUsed:
          type: boolean

    CouponValidateInput:
      type: object
      required: [code, orderAmount]
      properties:
        code:
          type: string
        orderAmount:
          type: number

    CouponValidateResult:
      type: object
      required: [valid, discount]
      properties:
        valid:
          type: boolean
        discount:
          type: number
        message:
          type: ["string", "null"]
        coupon:
          $ref: "#/components/schemas/Coupon"

    # ---- REVIEWS ----
    Review:
      type: object
      required: [id, userId, userName, rating, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        userAvatar:
          type: ["string", "null"]
        storeId:
          type: ["integer", "null"]
        productId:
          type: ["integer", "null"]
        orderId:
          type: ["integer", "null"]
        rating:
          type: number
        comment:
          type: ["string", "null"]
        images:
          type: array
          items:
            type: string
        createdAt:
          type: string

    ReviewInput:
      type: object
      required: [rating]
      properties:
        storeId:
          type: integer
        productId:
          type: integer
        orderId:
          type: integer
        rating:
          type: number
        comment:
          type: string

    # ---- FAVORITES ----
    Favorite:
      type: object
      required: [id, type, refId, name, image]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [store, product]
        refId:
          type: integer
        name:
          type: string
        image:
          type: string
        category:
          type: ["string", "null"]
        rating:
          type: ["number", "null"]
        price:
          type: ["number", "null"]

    FavoriteInput:
      type: object
      required: [type, refId]
      properties:
        type:
          type: string
          enum: [store, product]
        refId:
          type: integer

    # ---- NOTIFICATIONS ----
    Notification:
      type: object
      required: [id, title, body, type, isRead, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        type:
          type: string
          enum: [order, promo, system, driver, chat]
        isRead:
          type: boolean
        orderId:
          type: ["integer", "null"]
        image:
          type: ["string", "null"]
        createdAt:
          type: string

    # ---- FLASH SALES ----
